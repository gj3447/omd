\* DEEP config for omd_connect — larger Tasks set than the bounded CI cfg
\* (spec/omd_connect.cfg uses {t1, t2}). Run via scripts/run_tlc_deep.sh in the
\* nightly / workflow_dispatch `tla-deep` job, NOT in PR CI (state space is bigger).
CONSTANTS
  Tasks = {t1, t2, t3}

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANTS
  TypeOK
  AtMostOneMergeToken
  TokenImpliesConnecting
  MergedHasMergeSha
  MergedReleasesWriteLease
  PinnedOnlyWhileConnecting
  NoTwoConnectingWithToken
