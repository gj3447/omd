\* DEEP config for omd_lease — 2 agents / 3 tasks / 1 resource, higher fence
\* ceiling than the bounded CI cfg (spec/omd_lease.cfg uses 2/2/1, MaxFence=4).
\* Run via scripts/run_tlc_deep.sh in the nightly / workflow_dispatch `tla-deep`
\* job, NOT in PR CI (this exhausts a much larger interleaving space).
CONSTANTS
  Agents = {a1, a2}
  Tasks = {t1, t2, t3}
  Resources = {r1}
  MaxFence = 5

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANTS
  TypeOK
  NoOverlappingHeld
  UniqueLiveFence
  NoConnectBeforeDone
