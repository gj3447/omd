\* DEEP config for omd_leader — 3 coordinators, higher epoch/write ceilings than
\* the bounded CI cfg (spec/omd_leader.cfg uses 2 coordinators, MaxEpoch=3,
\* MaxWrites=3). Run via scripts/run_tlc_deep.sh in the nightly / workflow_dispatch
\* `tla-deep` job, NOT in PR CI.
CONSTANTS
  Coordinators = {c1, c2, c3}
  MaxEpoch = 5
  MaxWrites = 4

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANTS
  TypeOK
  SingleLeader
  NoEnabledStaleMutate
  StaleCoordinatorCannotBeLeader
