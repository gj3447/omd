# Red artifact (LTDD, 증분6/§D3): EPHEMERAL 플래그 보유자가 죽으면(bail) 관측가능하게
# 무엇이 방출돼야 하는가. set(EPHEMERAL) → producer 사망 → flag_broken(producer_dead) 이
# 순서대로 store 에 도착해야 한다(대기자 PRODUCER_DEAD 기상의 관측가능 증거).
cid: omd-flag-demo
service: omd
expect:
  - event: flag_set
    where: {flag_type: EPHEMERAL}    # 소유 신호가 세워짐(value-pinned)
    op: ">="
    count: 1
  - event: flag_broken
    where: {reason: producer_dead}    # 보유자 사망 → 자동 BROKEN
    op: "=="
    count: 1
  - must_order: [flag_set, flag_broken]
