# Red artifact (LTDD, 증분8/§D5): 응결 배리어의 참가자가 죽으면(bail) 관측가능하게 무엇이
# 방출돼야 하는가. barrier_declared → 참가자 사망 → barrier_broken(participant_dead) 이 순서대로
# store 에 도착해야 한다(도착해 있던 전원이 BROKEN 으로 기상 = 영구 hang 0 의 외부 증거).
cid: rendezvous
service: omd
expect:
  - event: barrier_declared
    where: {barrier: rendezvous}
    op: ">="
    count: 1
  - event: barrier_broken
    where: {barrier: rendezvous, reason: participant_dead}
    op: "=="
    count: 1
  - must_order: [barrier_declared, barrier_broken]
