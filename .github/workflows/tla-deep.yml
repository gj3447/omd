name: tla-deep

on:
  workflow_dispatch:
  schedule:
    # Nightly UTC. This is intentionally separate from PR CI because the models
    # use larger finite configs than the fast smoke gate.
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  deep:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        spec: [omd_lease, omd_connect, omd_leader]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Cache TLA+ tools
        uses: actions/cache@v4
        with:
          path: .tla-tools
          key: tla2tools-latest
      - name: Deep model check
        run: scripts/run_tlc_deep.sh "${{ matrix.spec }}"
